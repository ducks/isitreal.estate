services:
  postgres:
    image: postgres:16-alpine
    container_name: curbside_db
    environment:
      POSTGRES_USER: curbside
      POSTGRES_PASSWORD: curbside
      POSTGRES_DB: curbside
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
